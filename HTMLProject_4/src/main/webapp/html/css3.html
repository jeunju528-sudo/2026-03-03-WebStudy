<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
body {
  background: #f5f5f5;
  font-family: Arial, sans-serif;
}

/* 카드 */
.card {
  display: inline-block;
  width: 19%;
  margin-right: 1%;
  margin-bottom: 18px;
  vertical-align: top;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition: all 0.25s ease;
  position: relative;
}

.card:nth-child(5n) {
  margin-right: 0;
}

/* hover (쿠팡 느낌: 살짝 떠오름) */
.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* 이미지 */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* 텍스트 영역 */
.info {
  padding: 10px;
}

/* 브랜드 (무신사 느낌) */
.brand {
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
}

/* 상품명 */
.title {
  font-size: 13px;
  color: #111;
  height: 34px;
  overflow: hidden;
  line-height: 1.3;
}

/* 가격 */
.price {
  margin-top: 6px;
  font-size: 15px;
  font-weight: bold;
  color: #e11d48;
}

/* 할인 */
.discount {
  font-size: 12px;
  color: #16a34a;
  margin-left: 6px;
}

/* 버튼 */
.actions {
  padding: 8px 10px 12px;
}

.btn {
  font-size: 12px;
  padding: 5px 8px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #fafafa;
  cursor: pointer;
  margin-right: 4px;
}

.btn:hover {
  background: #eee;
}

.btn.active {
  border-color: #111;
}

/* 배지 (쿠팡 / 무신사 공통) */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 11px;
  padding: 4px 7px;
  border-radius: 999px;
  color: white;
  font-weight: bold;
}

.badge.hot { background: #ef4444; }
.badge.sale { background: #f59e0b; }
.badge.new { background: #22c55e; }

/* 📱 반응형 (grid 없이 유지) */
@media (max-width: 1024px) {
  .card { width: 24%; }
  .card:nth-child(5n) { margin-right: 1%; }
  .card:nth-child(4n) { margin-right: 0; }
}

@media (max-width: 768px) {
  .card { width: 49%; }
  .card:nth-child(2n) { margin-right: 0; }
}

@media (max-width: 480px) {
  .card { width: 100%; margin-right: 0; }
}
</style>

</head>
<body>
<div class="card" data-id="1">
  <span class="badge hot">HOT</span>
  <img src="https://picsum.photos/300/200?1">

  <div class="info">
    <div class="brand">Nike</div>
    <div class="title">에어맥스 270 리액트 스니커즈</div>
    <div class="price">
      129,000원 <span class="discount">-30%</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn like">❤️ 좋아요</button>
    <button class="btn wish">⭐ 찜</button>
  </div>
</div>

<div class="card" data-id="2">
  <span class="badge sale">SALE</span>
  <img src="https://picsum.photos/300/200?2">

  <div class="info">
    <div class="brand">Adidas</div>
    <div class="title">울트라부스트 러닝화</div>
    <div class="price">
      159,000원 <span class="discount">-20%</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn like">❤️ 좋아요</button>
    <button class="btn wish">⭐ 찜</button>
  </div>
</div>

</body>
</html>
