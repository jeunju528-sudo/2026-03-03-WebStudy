<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
/* 전체 테이블 */
table {
  width: 100%;
  border-collapse: collapse;
  font-family: Arial, sans-serif;
  font-size: 14px;
  margin: 20px 0;
  border-radius: 10px;
  overflow: hidden;
  background-color: #1e1e2f;
  color: #e5e7eb;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* 헤더 */
thead {
  background-color: #2d2d44;
}

th {
  text-align: left;
  padding: 14px 16px;
  color: #ffffff;
  font-weight: 600;
}

/* 셀 */
td {
  padding: 12px 16px;
  border-bottom: 1px solid #2f2f45;
}

/* 줄 hover 효과 */
tbody tr:hover {
  background-color: #2a2a3d;
}

/* 짝수 줄 살짝 구분 */
tbody tr:nth-child(even) {
  background-color: #232334;
}

/* 강조 컬럼 - 가격 */
.price {
  color: #22c55e;
  font-weight: bold;
}

/* 강조 컬럼 - 상태 (기본) */
.status {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  display: inline-block;
}

/* 상태: 성공 */
.status.success {
  background-color: rgba(34, 197, 94, 0.15);
  color: #22c55e;
}

/* 상태: 대기 */
.status.pending {
  background-color: rgba(234, 179, 8, 0.15);
  color: #facc15;
}

/* 상태: 실패 */
.status.error {
  background-color: rgba(239, 68, 68, 0.15);
  color: #f87171;
}
</style>

</head>
<body>
   <table>
  <thead>
    <tr>
      <th>상품명</th>
      <th>가격</th>
      <th>상태</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>노트북</td>
      <td class="price">1,200,000원</td>
      <td><span class="status success">완료</span></td>
    </tr>
    <tr>
      <td>모니터</td>
      <td class="price">300,000원</td>
      <td><span class="status pending">대기</span></td>
    </tr>
    <tr>
      <td>키보드</td>
      <td class="price">120,000원</td>
      <td><span class="status error">취소</span></td>
    </tr>
  </tbody>
</table>
   
</body>
</html>
