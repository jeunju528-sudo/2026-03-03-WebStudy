<!DOCTYPE html>

<meta charset="UTF-8">
<title>Insert title here</title>
<style>
/* 카드 기본 */
.card {
  display: inline-block;
  width: 19%;
  margin-right: 1%;
  margin-bottom: 16px;
  vertical-align: top;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  font-family: Arial, sans-serif;
}

/* 5개 정렬 보정 */
.card:nth-child(5n) {
  margin-right: 0;
}

/* 이미지 */
.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  display: block;
}

/* 내용 */
.card .content {
  padding: 10px;
  font-size: 14px;
}

/* 버튼 영역 */
.actions {
  display: block;
  padding: 0 10px 10px;
}

/* 버튼 스타일 */
.btn {
  font-size: 12px;
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #f9f9f9;
  cursor: pointer;
  margin-right: 5px;
}

/* 좋아요 */
.btn.like {
  color: #e11d48;
}

/* 찜 */
.btn.wish {
  color: #2563eb;
}

/* hover */
.btn:hover {
  background: #eee;
}
</style>

</head>
<body>

  <img src="https://picsum.photos/300/200?1">
  <div class="content">상품 1</div>

    <button class="btn wish">⭐ 찜</button>

</div>
